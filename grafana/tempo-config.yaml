stream_over_http: true
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  ring:
    kvstore:
      store: memberlist
  config:
    max_compaction_objects: 1000000
    block_size_bytes: 104857600
    sub_block_size_bytes: 1048576
    compaction_cycle: 30s

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks

blocks_storage_config:
  v2:
    path: /tmp/tempo/v2
